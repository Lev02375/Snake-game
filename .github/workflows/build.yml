name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y zlib1g-dev libffi-dev libssl-dev
        pip install buildozer cython pygame
    - name: Build APK
      run: |
        buildozer android debug --no-deploy --accept-licenses
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: snake-game
        path: bin/*.apk
