name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y zlib1g-dev libffi-dev libssl-dev unzip wget

    - name: Download and install Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        rm commandlinetools-linux-9477386_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true
        export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-30" "build-tools;30.0.3" "build-tools;37.0.0"

    - name: Link SDK to buildozer folder
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -sf $HOME/android-sdk ~/.buildozer/android/platform/android-sdk

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython pygame

    - name: Build APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/build-tools/30.0.3:$PATH
        buildozer android debug --no-deploy

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: snake-game
        path: bin/*.apk
