name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build with buildozer
      uses: kivy/buildozer-action@v1
      with:
        command: android debug
        target: android
        api_level: 30
        ndk_version: 23b
        sdk_version: 30
        build_tools_version: 30.0.3

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: snake-game
        path: bin/*.apk
